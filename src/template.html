<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Todo Planner</title>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar: Projects view and creation -->
    <aside class="sidebar">
      <h2>Projects</h2>
      <ul id="project-list"></ul>
      <form id="new-project-form">
        <input type="text" id="new-project-input" placeholder="New Project Name" required>
        <button type="submit">+</button>
      </form>
    </aside>

    <!-- Main Content: Active Project Todos -->
    <main class="main-content">
      <header class="project-header">
        <h1 id="active-project-title">Project Name</h1>
        <button id="add-todo-btn">Add Todo +</button>
      </header>
      <section id="todo-list"></section>
    </main>
  </div>

  <!-- Modal for Creating/Editing Todos -->
  <div id="todo-modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal-btn" class="close">&times;</span>
      <h2 id="modal-title">New Todo</h2>
      <form id="todo-form">
        <input type="hidden" id="todo-index-input"> <!-- Tracks if we are editing -->
        <label for="todo-title">Title*</label>
        <input type="text" id="todo-title" required>

        <label for="todo-desc">Description</label>
        <textarea id="todo-desc"></textarea>

        <label for="todo-date">Due Date*</label>
        <input type="date" id="todo-date" required>

        <label for="todo-priority">Priority*</label>
        <select id="todo-priority">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>

        <label for="todo-notes">Notes</label>
        <textarea id="todo-notes"></textarea>

        <button type="submit" id="save-todo-btn">Save Todo</button>
      </form>
    </div>
  </div>
</body>
</html>
